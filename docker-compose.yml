services:
  backend:
    build: ./pets-Backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/pets
    depends_on:
      - mongo
    restart: unless-stopped
  frontend:
    build: ./pets-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped
  jenkins:
    image: jenkins/jenkins:lts
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /run/host-services/docker.proxy.sock:/var/run/docker.sock
    restart: unless-stopped
volumes:
  mongodata:
  jenkins_data: